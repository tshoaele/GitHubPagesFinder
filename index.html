
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b0c0d">
<title>Live Pages</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@500;600;700&display=swap");

  :root {
    color-scheme: dark;
    --bg: #0b0c0d;
    --panel: rgba(255,255,255,.07);
    --line: rgba(255,255,255,.11);
    --text: #f5f5ef;
    --muted: #8d908b;
    --lime: #dfff55;
    --glow-a: rgba(223,255,85,.12);
    --glow-b: rgba(120,91,255,.13);
    --button-text: #10110e;
    --shadow: rgba(0,0,0,.22);
    --sans: "Syne", sans-serif;
    --display: "Instrument Serif", serif;
  }

  html[data-theme="light"] {
    color-scheme: light;
    --bg: #eeeee8;
    --panel: rgba(255,255,255,.58);
    --line: rgba(18,20,17,.12);
    --text: #171914;
    --muted: #6d7169;
    --lime: #b6ef39;
    --glow-a: rgba(154,221,25,.22);
    --glow-b: rgba(127,101,255,.13);
    --button-text: #11140d;
    --shadow: rgba(46,49,37,.1);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    background:
      radial-gradient(circle at 15% 0%, var(--glow-a), transparent 34rem),
      radial-gradient(circle at 100% 85%, var(--glow-b), transparent 32rem),
      var(--bg);
    font-family: var(--sans);
    transition: color .3s ease, background-color .3s ease;
  }

  body::before {
    content: "";
    position: fixed;
    z-index: -1;
    width: min(48vw, 520px);
    aspect-ratio: 1.3;
    top: -12vw;
    right: -10vw;
    border-radius: 42% 58% 67% 33% / 37% 42% 58% 63%;
    background: var(--glow-a);
    filter: blur(24px);
    animation: morph 10s ease-in-out infinite alternate;
  }

  .app {
    width: min(1180px, calc(100% - 36px));
    margin: 0 auto;
    padding: 24px 0 48px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: clamp(52px, 12vh, 110px);
  }

  .label {
    display: flex;
    align-items: center;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .13em;
    text-transform: uppercase;
  }

  .header-tools {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .count {
    color: var(--muted);
    font-size: .72rem;
  }

  h1 {
    max-width: 780px;
    margin: 0 0 14px;
    font-family: var(--display);
    font-size: clamp(3.8rem, 9vw, 7.8rem);
    font-weight: 400;
    line-height: .83;
    letter-spacing: -.045em;
  }

  h1 em {
    color: var(--lime);
    font-weight: 400;
  }

  .intro {
    margin: 0 0 30px;
    color: var(--muted);
    font-size: .86rem;
  }

  .theme-toggle {
    display: grid;
    width: 40px;
    height: 40px;
    padding: 0;
    place-items: center;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 50% 42% 50% 42%;
    box-shadow: 0 8px 24px var(--shadow);
  }

  .theme-toggle:hover {
    color: var(--button-text);
    background: var(--lime);
    border-radius: 42% 50% 42% 50%;
    transform: rotate(12deg);
  }

  .theme-icon {
    font-size: .92rem;
    line-height: 1;
  }

  .search {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 7px;
    padding: 7px;
    margin-bottom: 28px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 24px 34px 24px 34px;
    backdrop-filter: blur(18px);
    transition: border-radius .5s ease, border-color .2s ease;
  }

  .search:focus-within {
    border-color: rgba(223,255,85,.5);
    border-radius: 34px 24px 34px 24px;
  }

  input {
    min-width: 0;
    padding: 15px 17px;
    color: var(--text);
    background: transparent;
    border: 0;
    outline: 0;
    font: inherit;
    font-size: .9rem;
  }

  input::placeholder { color: #656862; }

  button {
    padding: 0 21px;
    color: var(--button-text);
    background: var(--lime);
    border: 0;
    border-radius: 18px 27px 18px 27px;
    font: inherit;
    font-size: .75rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform .2s ease, border-radius .35s ease;
  }

  button:hover {
    border-radius: 27px 18px 27px 18px;
    transform: scale(.98);
  }

  button:disabled { opacity: .5; cursor: wait; }

  .status {
    min-height: 22px;
    margin: -15px 4px 13px;
    color: var(--muted);
    font-size: .72rem;
  }

  #results {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 9px;
  }

  .page {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    min-width: 0;
    min-height: 150px;
    padding: 17px 19px;
    overflow: hidden;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 22px 34px 22px 34px;
    text-decoration: none;
    backdrop-filter: blur(14px);
    transition:
      transform .22s ease,
      background .22s ease,
      border-radius .45s ease,
      border-color .22s ease;
    box-shadow: 0 12px 34px var(--shadow);
  }

  .page:nth-child(even) {
    border-radius: 34px 22px 34px 22px;
  }

  .page:hover {
    background: rgba(255,255,255,.11);
    border-color: rgba(223,255,85,.38);
    border-radius: 38px 18px 38px 18px;
    transform: translateY(-2px);
  }

  .page:nth-child(even):hover {
    border-radius: 18px 38px 18px 38px;
  }

  .name {
    display: block;
    min-width: 0;
    font-family: var(--display);
    font-size: clamp(1.45rem, 2.2vw, 2rem);
    font-weight: 400;
    letter-spacing: -.025em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .desc {
    display: block;
    margin-top: 3px;
    color: var(--muted);
    font-size: .72rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .url {
    display: block;
    margin-top: 4px;
    color: var(--muted);
    font-size: .67rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .arrow {
    display: grid;
    flex: 0 0 auto;
    width: 38px;
    aspect-ratio: 1;
    place-items: center;
    color: var(--button-text);
    background: var(--lime);
    border-radius: 50% 42% 50% 42%;
    font-size: 1rem;
    transition: transform .25s ease, border-radius .35s ease;
  }

  .page:hover .arrow {
    border-radius: 42% 50% 42% 50%;
    transform: rotate(45deg);
  }

  .empty {
    padding: 34px 18px;
    color: var(--muted);
    text-align: center;
    font-size: .8rem;
    border: 1px dashed var(--line);
    border-radius: 30px;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
  }

  @keyframes morph {
    to { border-radius: 58% 42% 35% 65% / 51% 63% 37% 49%; }
  }

  @media (max-width: 480px) {
    .app { width: min(100% - 20px, 1180px); padding-top: 17px; }
    header { margin-bottom: 62px; }
    .search { grid-template-columns: 1fr 54px; }
    .search button { padding: 0; font-size: 0; }
    .search button::after { content: "Go"; font-size: .72rem; }
    .page { min-height: 112px; padding: 14px 15px; }
    .url { max-width: 66vw; }
  }

  @media (max-width: 860px) {
    #results { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 560px) {
    #results { grid-template-columns: 1fr; }
    h1 { font-size: clamp(3.4rem, 18vw, 5rem); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<main class="app">
  <header>
    <div class="label">Live index</div>
    <div class="header-tools">
      <div class="count" id="count">Live pages</div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to light mode" aria-pressed="false">
        <span class="theme-icon" aria-hidden="true">○</span>
      </button>
    </div>
  </header>

  <h1>Only what is <em>live.</em></h1>
  <p class="intro">Tap a page and go straight there.</p>

  <div class="search">
    <label for="username" class="sr-only">GitHub username</label>
    <input id="username" value="tshoaele" placeholder="GitHub username" autocapitalize="off" autocorrect="off" spellcheck="false">
    <button id="fetchBtn" onclick="loadPages()">Find pages</button>
  </div>

  <div class="status" id="status" aria-live="polite"></div>
  <section id="results" aria-label="Live GitHub Pages"></section>
</main>

<script>
const root = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const themeIcon = themeToggle.querySelector(".theme-icon");

function setTheme(theme) {
  const isLight = theme === "light";
  root.dataset.theme = theme;
  themeToggle.setAttribute("aria-pressed", String(isLight));
  themeToggle.setAttribute("aria-label", `Switch to ${isLight ? "dark" : "light"} mode`);
  themeIcon.textContent = isLight ? "●" : "○";
  localStorage.setItem("live-pages-theme", theme);
}

const savedTheme = localStorage.getItem("live-pages-theme");
const preferredTheme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
setTheme(savedTheme || preferredTheme);

themeToggle.addEventListener("click", () => {
  setTheme(root.dataset.theme === "light" ? "dark" : "light");
});

async function loadPages() {
  const username = document.getElementById("username").value.trim();
  const button = document.getElementById("fetchBtn");
  const status = document.getElementById("status");
  const results = document.getElementById("results");
  const count = document.getElementById("count");

  if (!username) {
    status.textContent = "Enter a username.";
    return;
  }

  button.disabled = true;
  status.textContent = "Looking for live pages...";
  results.innerHTML = "";
  count.textContent = "Searching";

  try {
    let repos = [];

    for (let page = 1; ; page++) {
      const response = await fetch(`https://api.github.com/users/${encodeURIComponent(username)}/repos?per_page=100&page=${page}&sort=updated`);

      if (!response.ok) {
        if (response.status === 404) throw new Error("User not found.");
        if (response.status === 403) throw new Error("GitHub rate limit reached. Try again shortly.");
        throw new Error(`GitHub returned ${response.status}.`);
      }

      const batch = await response.json();
      repos = repos.concat(batch);
      if (batch.length < 100) break;
    }

    const live = repos.filter(repo => repo.has_pages);
    count.textContent = `${live.length} live`;

    if (!live.length) {
      results.innerHTML = `<div class="empty">No live GitHub Pages found for ${escapeHtml(username)}.</div>`;
      status.textContent = "";
      return;
    }

    live.forEach(repo => {
      const url = repo.name.toLowerCase() === `${username.toLowerCase()}.github.io`
        ? `https://${username}.github.io/`
        : `https://${username}.github.io/${repo.name}/`;

      const link = document.createElement("a");
      link.className = "page";
      link.href = url;
      link.innerHTML = `
        <span>
          <span class="name">${escapeHtml(repo.name)}</span>
          ${repo.description ? `<span class="desc">${escapeHtml(repo.description)}</span>` : ""}
          <span class="url">${escapeHtml(url.replace("https://", ""))}</span>
        </span>
        <span class="arrow" aria-hidden="true">+</span>
      `;
      results.appendChild(link);
    });

    status.textContent = "";
  } catch (error) {
    status.textContent = error.message;
    count.textContent = "Unavailable";
  } finally {
    button.disabled = false;
  }
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, character => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  })[character]);
}

document.getElementById("username").addEventListener("keydown", event => {
  if (event.key === "Enter") loadPages();
});

window.addEventListener("DOMContentLoaded", loadPages);
</script>
</body>
</html>
